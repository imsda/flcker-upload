{% extends 'base.html' %}{% block heading %}General Settings{% endblock %}{% block content %}<form method="post" action="{{ url_for('settings_page') }}" class="settings-form"><input type="hidden" name="csrf" value="{{ csrf_token() }}"><section class="card"><h2>General</h2><div class="form-grid"><label>Public Base URL<input name="PUBLIC_BASE_URL" value="{{ vals.get('PUBLIC_BASE_URL') }}"></label><label>Timezone<input name="TIMEZONE" value="{{ vals.get('TIMEZONE','UTC') }}"></label><label>Poll interval<input type="number" name="POLL_INTERVAL_SECONDS" value="{{ vals.get('POLL_INTERVAL_SECONDS') }}"></label><label>Minimum file age<input type="number" name="MINIMUM_FILE_AGE_SECONDS" value="{{ vals.get('MINIMUM_FILE_AGE_SECONDS') }}"></label><label>Maximum attempts<input type="number" name="MAX_ATTEMPTS" value="{{ vals.get('MAX_ATTEMPTS') }}"></label><label>Log level<select name="LOG_LEVEL">{% for o in ['DEBUG','INFO','WARNING','ERROR'] %}<option {% if vals.get('LOG_LEVEL')==o %}selected{% endif %}>{{ o }}</option>{% endfor %}</select></label></div></section><section class="card"><h2>Calendar Matching</h2><div class="form-grid"><label>Buffer Before<input type="number" name="BUFFER_BEFORE_MINUTES" value="{{ vals.get('BUFFER_BEFORE_MINUTES') }}"></label><label>Buffer After<input type="number" name="BUFFER_AFTER_MINUTES" value="{{ vals.get('BUFFER_AFTER_MINUTES') }}"></label><label class="check"><input type="checkbox" name="REQUIRE_FLICKR_MARKER" {% if vals.get('REQUIRE_FLICKR_MARKER') == 'true' %}checked{% endif %}> Require FLICKR marker</label><label>No Matching Event<select name="NO_EVENT_ACTION">{% for o in ['unassigned','skip','manual-review'] %}<option value="{{ o }}" {% if vals.get('NO_EVENT_ACTION')==o %}selected{% endif %}>{{ o|replace('-',' ')|title }}</option>{% endfor %}</select></label><label>Unassigned Flickr Album<input name="UNASSIGNED_ALBUM" value="{{ vals.get('UNASSIGNED_ALBUM') }}"></label></div></section><section class="card"><h2>Flickr Defaults</h2><div class="form-grid"><label>Default Privacy<select name="FLICKR_DEFAULT_PRIVACY">{% for o in ['private','friends','family','friends-and-family','public'] %}<option {% if vals.get('FLICKR_DEFAULT_PRIVACY')==o %}selected{% endif %}>{{ o }}</option>{% endfor %}</select></label><label>Global Tags<input name="GLOBAL_TAGS" value="{{ vals.get('GLOBAL_TAGS') }}"></label></div></section><section class="card"><h2>Google Drive Processing</h2><div class="form-grid"><label>After successful upload<select name="DRIVE_SUCCESS_ACTION">{% for o in ['leave','move'] %}<option {% if vals.get('DRIVE_SUCCESS_ACTION')==o %}selected{% endif %}>{{ o }}</option>{% endfor %}</select></label><label>Success Folder<input name="DRIVE_SUCCESS_FOLDER" value="{{ vals.get('DRIVE_SUCCESS_FOLDER') }}"></label><label>Failed Folder<input name="DRIVE_FAILED_FOLDER" value="{{ vals.get('DRIVE_FAILED_FOLDER') }}"></label></div></section><button class="btn btn-primary">Save Settings</button></form>{% endblock %}
